<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #222;
      background: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }
    .icon { font-size: 20px; }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 8px 12px;
      background: #f5f5f5;
      border-radius: 8px;
    }
    .toggle-row label { font-weight: 500; font-size: 14px; }
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #ccc;
      border-radius: 22px;
      transition: .2s;
    }
    .slider:before {
      content: "";
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: .2s;
    }
    .switch input:checked + .slider { background: #4caf50; }
    .switch input:checked + .slider:before { transform: translateX(18px); }
    .field-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .field-group label { white-space: nowrap; min-width: 130px; }
    .field-group input[type="number"],
    .field-group input[type="text"] {
      flex: 1;
      padding: 5px 8px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 13px;
      width: 60px;
    }
    .field-group input[type="text"] { width: auto; }
    .field-group .unit { color: #888; font-size: 12px; white-space: nowrap; }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .checkbox-row input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
    .checkbox-row label { cursor: pointer; user-select: none; }
    .divider { border: none; border-top: 1px solid #eee; margin: 12px 0; }
    .status-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #666;
    }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 4px;
    }
    .status-dot.active { background: #4caf50; }
    .status-dot.inactive { background: #ccc; }
    .btn {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-primary {
      margin-top: 10px;
      background: #4a90d9;
      color: #fff;
    }
    .btn-primary:hover { background: #357abd; }
    .btn-primary:active { background: #2a5f9e; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .btn-secondary {
      background: #e8e8e8;
      color: #555;
    }
    .btn-secondary:hover { background: #ddd; }
    .log-area {
      display: none;
      max-height: 200px;
      overflow-y: auto;
      margin-top: 8px;
      padding: 6px;
      background: #f9f9f9;
      border: 1px solid #eee;
      border-radius: 5px;
      font-size: 11px;
      font-family: monospace;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-area.open { display: block; }
    .log-time { color: #888; }
    .log-error { color: #c33; }
    .note {
      font-size: 11px;
      color: #999;
      margin-top: 12px;
      line-height: 1.4;
    }

    .dark { color: #ddd; background: #1e1e1e; }
    .dark .toggle-row { background: #2a2a2a; }
    .dark .slider { background: #555; }
    .dark .slider:before { background: #ccc; }
    .dark .field-group input[type="number"],
    .dark .field-group input[type="text"] { background: #2a2a2a; border-color: #444; color: #ddd; }
    .dark .field-group .unit { color: #888; }
    .dark .checkbox-row label { color: #ccc; }
    .dark .divider { border-top-color: #333; }
    .dark .status-row { color: #999; }
    .dark .status-dot.inactive { background: #555; }
    .dark .btn-secondary { background: #333; color: #bbb; }
    .dark .btn-secondary:hover { background: #444; }
    .dark .log-area { background: #252525; border-color: #333; color: #bbb; }
    .dark .log-time { color: #666; }
    .dark .log-error { color: #e55; }
    .dark .note { color: #666; }
    .row { margin-top: 8px; }
    .theme-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding: 6px 0;
    }
    .theme-row label { font-size: 12px; color: #888; white-space: nowrap; }
    .theme-btn {
      flex: 1;
      padding: 4px 0;
      border: 1px solid #ddd;
      border-radius: 5px;
      background: #fff;
      color: #555;
      font-size: 11px;
      cursor: pointer;
      transition: .15s;
      text-align: center;
    }
    .theme-btn:hover { background: #f5f5f5; }
    .theme-btn.active { background: #4a90d9; color: #fff; border-color: #4a90d9; }
    .dark .theme-btn { background: #2a2a2a; border-color: #444; color: #999; }
    .dark .theme-btn:hover { background: #333; }
    .dark .theme-btn.active { background: #4a90d9; color: #fff; border-color: #4a90d9; }
  </style>
</head>
<body>
  <div class="header">
    <span class="icon">☀</span>
    <h1>Яндекс Погода Автокликер зонтиков</h1>
  </div>

  <div class="toggle-row">
    <label>Автоматизация</label>
    <label class="switch">
      <input type="checkbox" id="enabled">
      <span class="slider"></span>
    </label>
  </div>

  <div class="checkbox-row">
    <input type="checkbox" id="autoStart">
    <label for="autoStart">Автостарт при запуске браузера</label>
  </div>
  <div class="checkbox-row">
    <input type="checkbox" id="autoOpenPage">
    <label for="autoOpenPage">Автооткрытие страницы (если вкладка закрыта)</label>
  </div>

  <hr class="divider">

  <div class="field-group">
    <label for="intervalMinutes">Интервал:</label>
    <input type="number" id="intervalMinutes" min="1" step="1">
    <span class="unit">мин</span>
  </div>
  <div class="field-group">
    <label for="delayMin">Случайная задержка от:</label>
    <input type="number" id="delayMin" min="0" step="1">
    <span class="unit">до</span>
    <input type="number" id="delayMax" min="0" step="1">
    <span class="unit">сек</span>
  </div>
  <div class="field-group">
    <label for="targetUrl">URL страницы:</label>
    <input type="text" id="targetUrl">
  </div>

  <hr class="divider">

  <div class="status-row">
    <span>
      <span class="status-dot inactive" id="statusDot"></span>
      <span id="statusText">Неактивно</span>
    </span>
    <span>Последний клик: <span id="lastClick">--:--:--</span></span>
  </div>

  <button id="testBtn" class="btn btn-primary">▶ Проверить сейчас</button>

  <div class="row">
    <button id="logBtn" class="btn btn-secondary">📋 Логи</button>
    <div id="logArea" class="log-area"></div>
    <div style="display:none; gap:6px; margin-top:6px;" id="logActions">
      <button id="copyLogsBtn" class="btn btn-secondary" style="flex:1">📋 Копировать</button>
      <button id="clearLogsBtn" class="btn btn-secondary" style="flex:1">🗑 Очистить</button>
    </div>
  </div>

  <div class="theme-row">
    <label>Тема:</label>
    <button class="theme-btn" data-theme="system">Системная</button>
    <button class="theme-btn" data-theme="dark">Тёмная</button>
    <button class="theme-btn" data-theme="light">Светлая</button>
  </div>

  <div class="note">
    Расширение нажимает «Нет» на форме погодного отчета Яндекс Погоды.
  </div>

  <script src="popup.js"></script>
</body>
</html>
